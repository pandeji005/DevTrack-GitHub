{% extends "base.html" %}

{% block title %}Daily Logs{% endblock %}

{% block content %}
<div class="h-full flex flex-col -m-page-margin overflow-hidden relative">
    <!-- Editor Header - Primary actions moved to the left to avoid overlap with global floating controls -->
    <div class="h-16 border-b border-border-default flex items-center px-6 bg-bg-main shrink-0 gap-6">
        <div class="flex items-center gap-4">
            <h2 class="font-h3 text-h3 text-text-primary whitespace-nowrap" id="log-date-title">Daily Log</h2>
            <span id="sync-status" class="bg-surface-container text-text-secondary text-[10px] font-bold uppercase px-2 py-0.5 rounded border border-border-default">Ready</span>
        </div>
        
        <div class="flex items-center gap-2 border-l border-border-default pl-6">
            <button id="discard-log-btn" class="bg-surface-container-high border border-border-default text-text-primary px-3 py-1.5 rounded-lg font-meta text-meta hover:border-outline transition-all whitespace-nowrap">Discard</button>
            <button id="publish-log-btn" class="bg-success-green text-text-primary px-4 py-1.5 rounded-lg font-meta text-meta font-bold hover:opacity-90 transition-all flex items-center gap-2 shadow-lg shadow-success-green/10 whitespace-nowrap">
                <span id="publish-spinner" class="material-symbols-outlined text-[16px] animate-spin hidden">sync</span>
                <span id="publish-text">Publish to GitHub</span>
            </button>
        </div>
    </div>
    
    <!-- Commit Message Bar -->
    <div class="h-10 border-b border-border-default bg-surface-container-low flex items-center px-6 shrink-0">
        <span class="material-symbols-outlined text-text-secondary text-[18px] mr-2">edit_note</span>
        <input id="log-commit-message" type="text" class="flex-1 bg-transparent border-none focus:ring-0 text-meta font-meta text-accent-blue placeholder:text-text-secondary" placeholder="Commit message (optional)...">
    </div>
    
    <!-- Editor View -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Editor Middle -->
        <div class="flex-1 flex flex-col border-r border-border-default h-full overflow-hidden">
            <div class="h-10 bg-bg-surface border-b border-border-default flex items-center px-4 justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <span class="text-accent-blue font-semibold font-meta text-meta uppercase tracking-wider">Editor</span>
                    <div class="flex gap-2">
                        <button onclick="wrapText('**', '**')" class="material-symbols-outlined text-text-secondary text-body-sm hover:text-text-primary" title="Bold">format_bold</button>
                        <button onclick="wrapText('_', '_')" class="material-symbols-outlined text-text-secondary text-body-sm hover:text-text-primary" title="Italic">format_italic</button>
                        <button onclick="wrapText('`', '`')" class="material-symbols-outlined text-text-secondary text-body-sm hover:text-text-primary" title="Code">code</button>
                        <button onclick="insertList()" class="material-symbols-outlined text-text-secondary text-body-sm hover:text-text-primary" title="List">format_list_bulleted</button>
                    </div>
                </div>
                <button onclick="togglePreview()" id="preview-toggle-btn" class="flex items-center gap-2 px-3 py-1 bg-surface-container-high border border-border-default rounded-md hover:border-accent-blue/50 transition-all group">
                    <span class="material-symbols-outlined text-[16px] text-text-secondary group-hover:text-accent-blue">visibility</span>
                    <span class="text-[10px] font-bold text-text-secondary uppercase group-hover:text-text-primary">Preview</span>
                </button>
            </div>
            <textarea id="log-editor" class="flex-1 bg-bg-main text-text-primary font-mono text-body-sm p-6 resize-none focus:outline-none focus:ring-0 border-none h-full custom-scrollbar" placeholder="Write your developer log here..."></textarea>
            <div class="h-8 bg-surface-container-low border-t border-border-default flex items-center px-4 justify-between shrink-0">
                <div class="flex gap-4">
                    <span id="word-count" class="text-[10px] font-bold text-text-secondary uppercase">0 Words</span>
                    <span id="char-count" class="text-[10px] font-bold text-text-secondary uppercase">0 Chars</span>
                </div>
                <button onclick="autoFillWork()" class="flex items-center gap-1.5 text-accent-blue hover:text-accent-blue/80 transition-colors">
                    <span class="material-symbols-outlined text-[14px]">magic_button</span>
                    <span class="text-[10px] font-bold uppercase">Auto-Fill Today's Work</span>
                </button>
            </div>
        </div>
        
        <!-- Preview Right - Hidden by default -->
        <div id="log-preview-panel" class="hidden flex-1 flex flex-col bg-bg-surface h-full overflow-hidden animate-in slide-in-from-right duration-300">
             <div class="h-10 bg-bg-surface border-b border-border-default flex items-center px-4 shrink-0">
                <span class="text-text-secondary font-semibold font-meta text-meta uppercase tracking-wider">Live Preview</span>
            </div>
            <div id="log-preview" class="flex-1 p-6 prose prose-invert max-w-none overflow-y-auto custom-scrollbar text-text-primary">
                <!-- Preview rendered here -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const editor = document.getElementById('log-editor');
    const preview = document.getElementById('log-preview');
    const previewPanel = document.getElementById('log-preview-panel');
    const publishBtn = document.getElementById('publish-log-btn');
    const statusLabel = document.getElementById('sync-status');

    async function loadTodayLog() {
        try {
            const res = await fetch('/api/logs/today');
            const data = await res.json();
            
            // Priority: Local Storage (Draft) > Server
            const savedDraft = localStorage.getItem(`log_draft_{{ today_date }}`);
            if (savedDraft) {
                editor.value = savedDraft;
                showToast('Draft restored from local storage', 'info');
            } else if (data.content) {
                editor.value = data.content;
            }
            updatePreview();
        } catch (e) { console.error(e); }
    }

    // Auto-save to localStorage every 10 seconds
    setInterval(() => {
        if (editor.value.trim()) {
            localStorage.setItem(`log_draft_{{ today_date }}`, editor.value);
            console.log('Log auto-saved to local storage');
        }
    }, 10000);

    function updatePreview() {
        const raw = editor.value;
        const words = raw.trim() ? raw.trim().split(/\s+/).length : 0;
        document.getElementById('word-count').innerText = `${words} Words`;
        document.getElementById('char-count').innerText = `${raw.length} Chars`;

        if (raw.trim() === '') {
            preview.innerHTML = '<p class="text-text-secondary italic">Nothing to preview yet...</p>';
            return;
        }
        preview.innerHTML = marked.parse(raw);
    }

    function togglePreview() {
        const isHidden = previewPanel.classList.contains('hidden');
        if (isHidden) {
            previewPanel.classList.remove('hidden');
            previewPanel.classList.add('flex');
            document.getElementById('preview-toggle-btn').classList.add('bg-accent-blue/10', 'border-accent-blue/30');
            updatePreview();
        } else {
            previewPanel.classList.add('hidden');
            previewPanel.classList.remove('flex');
            document.getElementById('preview-toggle-btn').classList.remove('bg-accent-blue/10', 'border-accent-blue/30');
        }
    }

    function wrapText(before, after) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const text = editor.value;
        const selected = text.substring(start, end);
        editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
        editor.focus();
        editor.setSelectionRange(start + before.length, end + before.length);
        updatePreview();
    }

    function insertList() { wrapText('\n- ', ''); }

    async function autoFillWork() {
        try {
            const [tasksRes, activityRes] = await Promise.all([
                fetch('/api/tasks'),
                fetch('/api/analytics/activity')
            ]);
            const tasks = await tasksRes.json();
            const events = await activityRes.json();
            
            const doneTasks = tasks.filter(t => t.status === 'done');
            const recentCommits = events.filter(e => e.type === 'commit').slice(0, 5);
            
            let summary = `## Log: ${new Date().toLocaleDateString()}\n\n`;
            
            if (doneTasks.length > 0) {
                summary += `### ✅ Completed Tasks\n`;
                doneTasks.forEach(t => summary += `- ${t.title}\n`);
                summary += `\n`;
            }
            
            if (recentCommits.length > 0) {
                summary += `### 🚀 Recent Commits\n`;
                recentCommits.forEach(c => summary += `- ${c.title}\n`);
            }

            // Prevent adding duplicate summaries
            if (editor.value.includes(summary.split('\n')[0])) {
                showToast('Work summary already present', 'warning');
                return;
            }

            editor.value += (editor.value ? '\n\n' : '') + summary;
            updatePreview();
            showToast('Work summary imported!', 'success');
        } catch (e) {
            showToast('Failed to fetch activity', 'error');
        }
    }

    async function publishLog() {
        const content = editor.value;
        const commitMessage = document.getElementById('log-commit-message').value;
        if (!content.trim()) { showToast('Log is empty', 'warning'); return; }

        publishBtn.disabled = true;
        document.getElementById('publish-spinner').classList.remove('hidden');
        document.getElementById('publish-text').innerText = 'Syncing...';
        statusLabel.innerText = 'Syncing...';

        try {
            const response = await fetch('/api/logs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, commit_message: commitMessage })
            });
            const data = await response.json();
            if (data.success) {
                // Clear local draft on successful publish
                localStorage.removeItem(`log_draft_{{ today_date }}`);
                
                showToast('Log published to GitHub', 'success');
                document.getElementById('publish-text').innerText = 'Published!';
                statusLabel.innerText = 'GitHub Synced';
                statusLabel.className = 'bg-success-green/20 text-success-green text-meta font-meta px-2 py-0.5 rounded border border-success-green/30';
                setTimeout(() => { document.getElementById('publish-text').innerText = 'Publish to GitHub'; }, 3000);
            } else {
                showToast(data.message || 'Sync failed', 'error');
                document.getElementById('publish-text').innerText = 'Error';
            }
        } catch (e) {
            showToast('Connection error', 'error');
            document.getElementById('publish-text').innerText = 'Error';
        } finally {
            publishBtn.disabled = false;
            document.getElementById('publish-spinner').classList.add('hidden');
        }
    }

    editor.addEventListener('input', updatePreview);
    publishBtn.addEventListener('click', publishLog);
    document.getElementById('discard-log-btn').onclick = () => {
        if (confirm('Discard changes?')) loadTodayLog();
    };

    loadTodayLog();
</script>
<style>
    /* Basic markdown preview styles */
    #log-preview h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; border-bottom: 1px solid var(--border-default); padding-bottom: 0.5rem; }
    #log-preview h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    #log-preview p { margin-bottom: 1rem; line-height: 1.6; color: var(--text-secondary); }
    #log-preview ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    #log-preview li { margin-bottom: 0.25rem; color: var(--text-secondary); }
    #log-preview code { background: var(--surface-container-high); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
</style>
{% endblock %}
